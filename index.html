<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รายงานผลิต/จ่าย ลูกชิ้น</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--blue:#0071e3;--blue-press:#0059b8;--orange:#ff9f0a;--ink:#1d1d1f;--muted:#86868b;--faint:#aeaeb2;
--line:#e6e6ea;--line-strong:#d6d6db;--panel-2:#ececef;--sat:#fff4e0;--tot:#eef4ff;--tot-line:#d4e3ff;--sum:#f0f3f8;
--shadow:0 20px 60px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.10);--radius:14px}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI","Sukhumvit Set","Sarabun","Noto Sans Thai",sans-serif;color:var(--ink);
background:radial-gradient(1200px 700px at 15% -10%,#d9e6ff 0%,transparent 55%),radial-gradient(1100px 800px at 110% 10%,#ffe9d6 0%,transparent 50%),linear-gradient(160deg,#eef1f6 0%,#e7ebf2 100%);
-webkit-font-smoothing:antialiased;display:flex;justify-content:center;align-items:center;padding:26px}
.window{width:100%;max-width:1240px;height:calc(100vh - 52px);max-height:900px;background:rgba(255,255,255,.86);
backdrop-filter:saturate(180%) blur(30px);-webkit-backdrop-filter:saturate(180%) blur(30px);
border:1px solid rgba(0,0,0,.09);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
.titlebar{height:50px;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:1px solid var(--line);background:linear-gradient(#fbfbfd,#f3f3f6)}
.titlebar .t{font-size:13.5px;font-weight:600;letter-spacing:.2px}
.titlebar .s{font-size:11px;color:var(--muted);margin-top:1px;max-width:76%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sectionbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:12px 16px 0;flex-wrap:wrap}
.bigseg{display:inline-flex;background:#e9edf4;border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px;flex-wrap:wrap}
.bigseg button{border:0;background:transparent;font:inherit;font-size:14px;font-weight:700;color:#5c6472;padding:8px 20px;border-radius:9px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:7px}
.bigseg button.on{background:#fff;color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.16)}
.bigseg .ic{font-size:15px}
.toolbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);background:rgba(250,250,252,.7);flex-wrap:wrap}
.seg{display:inline-flex;background:var(--panel-2);border-radius:9px;padding:2px;gap:2px;overflow:auto}
.seg button{border:0;background:transparent;font:inherit;font-size:12.5px;font-weight:500;color:#4a4a4f;padding:5px 13px;border-radius:7px;cursor:pointer;white-space:nowrap}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.14),0 0 0 .5px rgba(0,0,0,.04);font-weight:600}
#prodTabs button.on{color:#0a4fb0}
#monthTabs{max-width:34%}
.spacer{flex:1}
.search{position:relative}
.search input{font:inherit;font-size:12.5px;width:160px;padding:6px 10px 6px 28px;border:1px solid var(--line-strong);border-radius:8px;background:#fff;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
.search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.15)}
.search svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--faint)}
.cmpsel{font:inherit;font-size:12px;padding:6px 8px;border:1px solid var(--line-strong);border-radius:8px;background:#fff;color:var(--ink)}
#chartCtrls{display:none;align-items:center;gap:10px;flex-wrap:wrap}
#invCtrls{display:none;align-items:center;gap:10px;flex-wrap:wrap}
#cmpWrap{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#4a4a4f}
.btn{font:inherit;font-size:12.5px;font-weight:600;color:#fff;background:var(--blue);border:0;padding:7px 14px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.btn:hover{background:var(--blue-press)}.btn:active{transform:translateY(.5px)}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line-strong)}
.btn.ghost:hover{background:#f4f4f6}
.stats{display:flex;gap:10px;padding:14px 16px 4px;flex:0 0 auto;flex-wrap:wrap}
.card{flex:1 1 0;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.card .lab{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.2px}
.card .val{font-size:22px;font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.card .sub{font-size:10.5px;color:var(--faint);margin-top:1px}
.card.accent .val{color:var(--blue)}.card.orange .val{color:var(--orange)}
.up{color:#1a9d5a}.down{color:#d64545}
.mcap{flex:0 0 auto;margin:10px 16px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 14px;background:linear-gradient(90deg,#eaf1ff,#f7faff);border:1px solid var(--tot-line);border-radius:10px;font-size:13px;font-weight:600;color:#0a4fb0}
.mcap .pill{font-size:11px;font-weight:600;color:#6b7280;background:#fff;border:1px solid var(--line);border-radius:20px;padding:2px 10px}
.mcap .cal{font-size:15px}
.invwarn{flex:0 0 auto;margin:10px 16px 0;padding:10px 14px;background:#fff8e6;border:1px solid #f0d98c;border-radius:10px;font-size:12px;color:#8a6d1a;line-height:1.8}
.invwarn b{color:#6b5410}
.invwarn .nbtn{font:inherit;font-size:11.5px;font-weight:700;color:#fff;background:#0071e3;border:0;border-radius:7px;padding:3px 11px;margin-left:6px;cursor:pointer;vertical-align:middle}
.invwarn .nbtn:hover{background:#0059b8}
.btn.on{background:#e8f0ff;color:var(--blue);border-color:#bcd6ff}
td.edit{cursor:text;outline:none}
td.edit:focus{background:#fffbe6!important;box-shadow:inset 0 0 0 2px var(--blue);border-radius:3px}
tbody.editing td.edit{background:#fcfdff}
tbody.editing tr:hover td.edit{background:#f3f8ff}
td.summiss{background:#ffe3e3!important;color:#c0392b;font-weight:700;box-shadow:inset 0 0 0 1.5px #ef9a9a;cursor:help}
.sumwarn{flex:0 0 auto;margin:10px 16px 0;padding:10px 14px;background:#fdecea;border:1px solid #f3b0b0;border-radius:10px;font-size:12px;color:#a5342a;line-height:1.7}
.sumwarn b{color:#8a2a22}
.sumwarn .nbtn{font:inherit;font-size:11.5px;font-weight:700;color:#fff;background:#d64545;border:0;border-radius:7px;padding:3px 11px;margin-left:8px;cursor:pointer;vertical-align:middle}
.sumwarn .nbtn:hover{background:#b83b3b}
td.c-del,th.c-del{width:34px;text-align:center;position:sticky;right:0;background:#fff;z-index:1}
tbody tr:hover td.c-del{background:#f6f9ff}
.delbtn{border:0;background:#ffe3e3;color:#d64545;border-radius:6px;width:22px;height:22px;font-size:12px;cursor:pointer;line-height:1;padding:0}
.delbtn:hover{background:#f7b6b6}
tbody.editing tr.delrow{cursor:context-menu}
tbody.editing tr.delrow:hover td.c-no{background:#ffe3e3;color:#d64545}
.modal-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
 background:rgba(20,22,28,.34);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
 opacity:0;transition:opacity .16s ease}
.modal-overlay.show{opacity:1}
.modal-card{width:min(92vw,380px);background:#fff;border-radius:16px;padding:22px 22px 16px;
 box-shadow:0 24px 70px rgba(0,0,0,.32);transform:translateY(8px) scale(.97);transition:transform .18s cubic-bezier(.2,.8,.3,1);text-align:center}
.modal-overlay.show .modal-card{transform:translateY(0) scale(1)}
.modal-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:7px}
.modal-msg{font-size:13.5px;color:#4a4a4f;line-height:1.6;margin-bottom:18px}
.modal-msg b{color:var(--ink)}
.modal-actions{display:flex;gap:9px}
.mbtn{flex:1;font:inherit;font-size:14px;font-weight:600;padding:9px 14px;border-radius:10px;border:0;cursor:pointer;transition:background .15s}
.mbtn.ghost{background:#ececef;color:var(--ink)}
.mbtn.ghost:hover{background:#e2e2e6}
.mbtn.primary{background:var(--blue);color:#fff}
.mbtn.primary:hover{background:var(--blue-press)}
.mbtn.danger{background:#d64545;color:#fff}
.mbtn.danger:hover{background:#bb3a3a}
.cloudbar{display:inline-flex;align-items:center;gap:7px;flex-wrap:wrap}
.cloudlbl{font-size:15px}
.slotinput{font:inherit;font-size:12.5px;width:120px;padding:6px 9px;border:1px solid var(--line-strong);border-radius:8px;background:#fff;color:var(--ink);outline:none}
.slotinput:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.15)}
#cloudSaveBtn.busy{opacity:.6;pointer-events:none}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(14px);z-index:120;
 background:rgba(28,28,32,.94);color:#fff;font-size:13px;font-weight:500;padding:10px 18px;border-radius:11px;
 box-shadow:0 10px 34px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;max-width:80vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(26,127,75,.96)}
.toast.err{background:rgba(200,60,50,.96)}
.modal-list{display:flex;flex-direction:column;gap:7px;max-height:52vh;overflow:auto;text-align:left;margin-top:4px}
.mlist-item{font:inherit;text-align:left;background:#f5f7fa;border:1px solid var(--line);border-radius:10px;padding:10px 13px;cursor:pointer;color:var(--ink);transition:background .12s,border-color .12s}
.mlist-item:hover{background:#eaf1ff;border-color:var(--tot-line)}
.mlist-item b{font-size:14px}
.mlist-row{display:flex;gap:7px;align-items:stretch}
.mlist-row .mlist-item{flex:1}
.mlist-del{flex:0 0 auto;width:42px;border:1px solid #f0c9c9;background:#fdecec;color:#d64545;border-radius:10px;cursor:pointer;font-size:15px}
.mlist-del:hover{background:#f9dada}
#splash{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
 background:radial-gradient(130% 130% at 50% 28%,#fffdf8 0%,#fbf5e8 55%,#f6efdd 100%);
 transition:opacity .5s ease,visibility .5s ease}
#splash.hide{opacity:0;visibility:hidden}
.splash-inner{text-align:center;animation:splashIn .7s cubic-bezier(.2,.8,.3,1)}
.splash-logo{width:min(60vw,360px);mix-blend-mode:multiply;filter:drop-shadow(0 8px 18px rgba(150,30,30,.12))}
.splash-sub{margin-top:6px;font-size:15px;font-weight:600;color:#9a2f2f;letter-spacing:.4px}
.splash-dots{margin-top:16px;display:flex;gap:7px;justify-content:center}
.splash-dots span{width:8px;height:8px;border-radius:50%;background:#d64545;opacity:.35;animation:splashDot 1s infinite}
.splash-dots span:nth-child(2){animation-delay:.15s}
.splash-dots span:nth-child(3){animation-delay:.3s}
@keyframes splashDot{0%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-5px)}}
@keyframes splashIn{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:none}}
@media print{#splash{display:none!important}}
.invwarn .pair{display:inline-block;background:#fff;border:1px solid #e2c869;border-radius:6px;padding:1px 8px;margin:2px 5px 2px 0;font-weight:600;font-family:ui-monospace,Menlo,Consolas,monospace}
.tablewrap{flex:1 1 auto;overflow:auto;margin:10px 16px 0;border:1px solid var(--line);border-radius:12px;background:#fff}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:12px}
th,td{padding:7px 9px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;border-bottom:1px solid var(--line)}
thead th{position:sticky;top:0;z-index:3;background:#f7f7f9;color:#4a4a4f;font-weight:600;border-bottom:1px solid var(--line-strong)}
thead th.sat{background:var(--sat);color:#946200}thead th.tot{background:var(--tot);color:#0a4fb0}
.c-no{width:40px;text-align:center;color:var(--muted)}.c-name{text-align:left;font-weight:500}
th.c-no,td.c-no{position:sticky;left:0;z-index:2;background:#fff;width:40px}
th.c-name,td.c-name{position:sticky;left:40px;z-index:2;background:#fff;min-width:200px;max-width:230px;overflow:hidden;text-overflow:ellipsis;box-shadow:1px 0 0 var(--line)}
thead th.c-no,thead th.c-name{z-index:4;background:#f7f7f9}
tbody tr:hover td{background:#f6f9ff}tbody tr:hover td.c-no,tbody tr:hover td.c-name{background:#f6f9ff}
td.sat{background:#fffaf0}
td.tot{background:var(--tot);font-weight:700;color:#0a4fb0;border-left:1px solid var(--tot-line)}
td.bf{color:var(--muted)}td.zero{color:#cfcfd4}
td.neg{color:#d64545;font-weight:700}
tr.sum td{background:var(--sum);font-weight:600;border-top:1px solid var(--line-strong)}
tr.sum td.c-name{background:var(--sum);color:#2b3a55}
tr.sum:hover td{background:#e7edf6}tr.sum td.tot{background:#e2ebfa}
tr.sum.hl td{background:#e8f0ff}tr.sum.hl td.c-name{background:#e8f0ff;color:var(--blue)}
tr.invtot td{background:#eef4ff;font-weight:700;color:#0a4fb0;border-top:2px solid var(--tot-line)}
tr.invtot td.c-name{background:#eef4ff;color:#0a4fb0}
tr.invtot:hover td{background:#e2ebfa}
.chartpane{flex:1 1 auto;overflow:auto;margin:12px 16px 0;border:1px solid var(--line);border-radius:12px;background:#fff;padding:6px 4px}
.legend{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:8px 14px 4px;font-size:12px;color:#4a4a4f}
.legend .k{display:inline-flex;align-items:center;gap:7px}
.legend .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
.bar-row .lbl{font-size:11.5px;fill:#33333a}.bar-row .vt{font-size:10px;font-weight:600}
.colorbar{flex:0 0 auto;margin:12px 16px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:9px 13px;background:#fbfbfd;border:1px solid var(--line);border-radius:10px;font-size:12px;color:#4a4a4f}
.colorbar .clbl{font-weight:600;color:var(--muted)}
.cchip{display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.cchip input[type=color]{width:26px;height:20px;padding:0;border:1px solid var(--line-strong);border-radius:5px;background:none;cursor:pointer}
.cchip input[type=color]::-webkit-color-swatch-wrapper{padding:2px}
.cchip input[type=color]::-webkit-color-swatch{border:none;border-radius:3px}
.creset{margin-left:auto;font:inherit;font-size:11.5px;color:var(--blue);background:none;border:0;cursor:pointer;font-weight:600}
.creset:hover{text-decoration:underline}
#printBanner{display:none}
.hidden{display:none}
.foot{flex:0 0 auto;padding:9px 18px 13px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:2px;background:#d64545;display:inline-block}
.foot .fspacer{flex:1}
.saveinfo{font-size:10.5px;color:var(--faint)}
.linkbtn{font:inherit;font-size:11px;color:var(--blue);background:none;border:0;cursor:pointer;font-weight:600;padding:0}
.linkbtn:hover{text-decoration:underline}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.22);border-radius:6px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.34);background-clip:content-box}
@media (max-width:640px){body{padding:0}.window{height:100vh;max-height:none;border-radius:0;border:0}.card .val{font-size:19px}}
@media print{
 html,body{height:auto}
 body{background:#fff;display:block;padding:0}
 .window{width:100%;max-width:none;height:auto;max-height:none;border:0;border-radius:0;box-shadow:none;background:#fff;backdrop-filter:none;-webkit-backdrop-filter:none;display:block}
 .titlebar,.toolbar,.foot,.sectionbar,.colorbar{display:none!important}
 #printBanner{display:block;padding:0 0 7px;margin:0 0 7px;border-bottom:2px solid #111}
 #printBanner .pb-t{font-size:15px;font-weight:700}
 #printBanner .pb-s{font-size:10.5px;color:#444;margin-top:3px}
 .stats{display:flex!important;gap:7px;padding:0 0 8px}
 .card{flex:1 1 0;min-width:0;padding:6px 9px;box-shadow:none!important;border:1px solid #cfcfd4;border-radius:8px;break-inside:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact}
 .card .lab{font-size:8.5px}.card .val{font-size:14px;margin-top:1px}.card .sub{font-size:8px}
 body.pt-chart #tablePane,body.pt-chart .mcap,body.pt-chart .invwarn,body.pt-chart .sumwarn{display:none!important}
 body.pt-chart #chartPane{display:block!important;border:0;margin:0;padding:0;overflow:visible;height:auto;page-break-inside:avoid}
 body.pt-chart .legend{padding:0 0 6px;font-size:10px}
 body.pt-chart #chartSvg{width:auto!important;max-width:100%!important;height:calc(100vh - 58mm)!important;max-height:228mm!important;margin:0 auto;display:block;page-break-inside:avoid}
 body.pt-table #chartPane,body.pt-table .invwarn,body.pt-table .sumwarn{display:none!important}
 body.pt-table .mcap{display:flex!important;margin:0 0 5px;font-size:10px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
 body.pt-table .stats{padding:0 0 5px;gap:5px}
 body.pt-table .card{padding:4px 7px}
 body.pt-table #tablePane{display:block!important;border:0;margin:0;padding:0;overflow:hidden;width:var(--pw,auto);height:var(--ph,auto)}
 body.pt-table #tablePane #tbl{transform:scale(var(--pz,1));transform-origin:top left}
 body.pt-table table{width:auto;table-layout:auto}
 body.pt-table th,body.pt-table td{border-bottom:1px solid #e2e2e2}
 body.pt-table thead{display:table-header-group}
 body.pt-table thead th,body.pt-table th.c-no,body.pt-table td.c-no,body.pt-table th.c-name,body.pt-table td.c-name{position:static!important;box-shadow:none!important}
 body.pt-table th.c-name,body.pt-table td.c-name{max-width:none;min-width:0;white-space:nowrap}
 body.pt-table td.c-del,body.pt-table th.c-del{display:none!important}
 body.pt-table td.summiss{background:transparent!important;box-shadow:none!important;color:inherit!important;font-weight:400!important}
 body.pt-table tr{page-break-inside:avoid}
 body.pt-table td.sat,body.pt-table th.sat,body.pt-table td.tot,body.pt-table th.tot,body.pt-table tr.sum td,body.pt-table tr.invtot td{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

function fixSums(){

  if(FILE_NAME) saveData();

/* ---------- INVENTORY ---------- */
function invData(){
  const label=INV_LABELS[invProdIdx];
  const pr=sectionByKey('ผลิต').products.find(p=>p.label===label);
  const di=sectionByKey('จ่าย').products.find(p=>p.label===label);
  const pb=parseBlocks(pr.grid), db=di?parseBlocks(di.grid):[];
  const dmap=new Map(db.map(b=>[monthLabel(b.title),b]));
  const months=pb.map(b=>monthLabel(b.title));
  const order=[]; const push=n=>{ if(n!==''&&order.indexOf(n)===-1) order.push(n); };
  pb.forEach(b=>b.items.forEach(r=>push(norm(r[b.nameCol.idx]))));
  db.forEach(b=>b.items.forEach(r=>push(norm(r[b.nameCol.idx]))));
  const perMonth=pb.map((b,mi)=>{
    const d=dmap.get(months[mi]);
    const bfMap=new Map(), pMap=new Map(), dMap=new Map();
    b.items.forEach(r=>{ const nm=norm(r[b.nameCol.idx]);
      const bv=b.bfCol?r[b.bfCol.idx]:0; bfMap.set(nm, typeof bv==='number'?bv:0);
      const tv=r[b.totCol.idx]; pMap.set(nm, typeof tv==='number'?tv:0); });
    if(d) d.items.forEach(r=>{ const nm=norm(r[d.nameCol.idx]); const tv=r[d.totCol.idx]; dMap.set(nm, typeof tv==='number'?tv:0); });
    const rows=order.map(nm=>{ const open=bfMap.get(nm)||0, prod=pMap.get(nm)||0, disp=dMap.get(nm)||0;
      return {name:nm, open, prod, disp, bal:open+prod-disp}; }).filter(o=>o.open||o.prod||o.disp);
    return {month:months[mi], rows};
  });
  const bf0=perMonth.length?new Map(perMonth[0].rows.map(r=>[r.name,r.open])):new Map();
  const cumRows=order.map(nm=>{
    const open=bf0.get(nm)||0;
    let prod=0, disp=0;
    perMonth.forEach(pm=>{ const f=pm.rows.find(x=>x.name===nm); if(f){ prod+=f.prod; disp+=f.disp; } });
    return {name:nm, open, prod, disp, bal:open+prod-disp};
  }).filter(o=>o.open||o.prod||o.disp);
  return {label, months, perMonth, cumRows};
}
function nameIssuesForGrids(list){
  const seen=new Map();
  list.forEach(o=>{ if(!o||!o.grid) return; parseBlocks(o.grid).forEach(b=>b.items.forEach(r=>{
    const nm=norm(r[b.nameCol.idx]); if(nm==='') return; const k=nlabel(nm);
    if(!seen.has(k)) seen.set(k,new Map());
    const m=seen.get(k); if(!m.has(nm)) m.set(nm,new Set()); m.get(nm).add(o.where+' · '+monthLabel(b.title));
  })); });
  const issues=[];
  seen.forEach(variants=>{ if(variants.size>1) issues.push([...variants.entries()].map(function(e){return {name:e[0],places:[...e[1]]};})); });
  return issues;
}
function renderNameWarn(list){
  const el=document.getElementById('invWarn'); const issues=nameIssuesForGrids(list);
  if(!issues.length){ el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  el.innerHTML='<b>⚠️ พบชื่อรายการสะกดไม่ตรงกัน '+issues.length+' กลุ่ม</b> — ระบบจะนับเป็นคนละรายการ ทำให้ยอด/กราฟเพี้ยน '
   +'<button class="nbtn" id="fixNamesBtn">🔧 รวมชื่อให้ตรงกันอัตโนมัติ</button><br>'
   + issues.map(g=>g.map(v=>'<span class="pair" title="'+esc(v.places.join(', '))+'">'+esc(v.name)+'</span>').join(' ↔ ')
       +' <span style="color:#a08641">('+esc(g.map(v=>v.places.join(', ')).join(' | '))+')</span>').join('<br>');
  document.getElementById('fixNamesBtn').onclick=doFixNames;
}
function invGridList(){ const pl=INV_LABELS[invProdIdx]; const pr=sectionByKey('ผลิต').products.find(p=>p.label===pl); const diS=sectionByKey('จ่าย'); const di=diS?diS.products.find(p=>p.label===pl):null; return [{grid:pr&&pr.grid,where:'ผลิต'},{grid:di&&di.grid,where:'จ่าย'}]; }
function pjGridList(){ const pl=PJ_LABELS[pjProdIdx]; const pr=sectionByKey('ผลิต').products.find(p=>p.label===pl); const diS=sectionByKey('จ่าย'); const di=diS?diS.products.find(p=>p.label===pl):null; return [{grid:pr&&pr.grid,where:'ผลิต'},{grid:di&&di.grid,where:'จ่าย'}]; }
function allNameGroups(){
  const map=new Map();
  SECTIONS.forEach(sec=>sec.products.forEach(p=>parseBlocks(p.grid).forEach(b=>b.items.forEach(r=>{
    const nm=norm(r[b.nameCol.idx]); if(nm==='') return; const k=nlabel(nm);
    if(!map.has(k)) map.set(k,new Map());
    const m=map.get(k); m.set(nm,(m.get(nm)||0)+1);
  }))));
  return map;
}
function fixNames(){
  const map=allNameGroups(); const rename=new Map(); let groups=0;
  map.forEach(variants=>{ if(variants.size>1){ groups++;
    let best=null,bestc=-1;
    variants.forEach((c,name)=>{ if(c>bestc||(c===bestc&&best!=null&&name.length<best.length)){ best=name; bestc=c; } });
    variants.forEach((c,name)=>{ if(name!==best) rename.set(name,best); });
  } });
  if(!rename.size) return 0;
  SECTIONS.forEach(sec=>sec.products.forEach(p=>p.grid.forEach(row=>{
    for(let c=0;c<row.length;c++){ const v=norm(row[c]); if(typeof v==='string'&&rename.has(v)) row[c]=rename.get(v); }
  })));
  return groups;
}

}

  document.getElementById('searchWrap').style.display='';
  document.getElementById('printBtn').classList.remove('hidden');
  document.getElementById('printBtn').title='พิมพ์ตารางคงเหลือ (แนวนอน)';
  EDIT=false; document.getElementById('editBtn').classList.add('hidden'); document.getElementById('xlsxBtn').classList.add('hidden');
  document.getElementById('sumWarn').classList.add('hidden');
  document.getElementById('chartPane').classList.add('hidden');
  document.getElementById('colorBar').classList.add('hidden');
  document.getElementById('monthCaption').classList.remove('hidden');
  document.getElementById('tablePane').classList.remove('hidden');
  document.getElementById('footnote').textContent='คงเหลือ = ยกมา + ผลิต − จ่าย · เลขแดง = ติดลบ (จ่ายเกินของที่มี)';
  const el=document.getElementById('prodTabs'); el.innerHTML='';
  el.style.display=INV_LABELS.length>1?'inline-flex':'none';
  INV_LABELS.forEach((lb,i)=>{ const b=document.createElement('button'); b.textContent=lb;
    b.className=i===invProdIdx?'on':''; b.onclick=()=>{ invProdIdx=i; enterInventory(); }; el.appendChild(b); });
  renderInvModeSeg(); renderInvMonthTabs(); renderNameWarn(invGridList()); renderStats(); renderInvCaption(); renderInvTable();
}
function renderInvModeSeg(){
  document.querySelectorAll('#invModeSeg button').forEach(b=>b.classList.toggle('on', b.dataset.i===invMode));
}
function renderInvMonthTabs(){
  const el=document.getElementById('invMonthTabs');
  if(invMode!=='month'){ el.style.display='none'; el.innerHTML=''; return; }
  const d=invData(); if(invMonthIdx>=d.months.length) invMonthIdx=0;
  el.style.display='inline-flex'; el.innerHTML='';
  d.months.forEach((m,i)=>{ const b=document.createElement('button'); b.textContent=m;
    b.className=i===invMonthIdx?'on':''; b.onclick=()=>{ invMonthIdx=i; renderInvMonthTabs(); renderStats(); renderInvCaption(); renderInvTable(); }; el.appendChild(b); });
}
function invRows(){
  const d=invData();
  return invMode==='cum' ? d.cumRows : ((d.perMonth[Math.min(invMonthIdx,d.perMonth.length-1)]||{rows:[]}).rows);
}
function invScopeText(){
  const d=invData();
  return invMode==='cum'
    ? (d.months.length>1?('สะสม '+d.months.length+' เดือน ('+d.months[0]+' – '+d.months[d.months.length-1]+')'):('เดือน'+d.months[0]))
    : ('เดือน'+d.months[Math.min(invMonthIdx,d.months.length-1)]);
}
function renderInvCaption(){
  const rows=invRows(); const el=document.getElementById('monthCaption');
  const bal=rows.reduce((s,r)=>s+r.bal,0), neg=rows.filter(r=>r.bal<0).length;
  el.innerHTML='<span class="cal">📦</span> คงเหลือ '+esc(INV_LABELS[invProdIdx])+' — '+esc(invScopeText())+
    ' <span class="pill">'+rows.length+' รายการ</span><span class="pill">คงเหลือรวม '+fmt(bal)+'</span>'+
    (neg?'<span class="pill" style="color:#d64545">ติดลบ '+neg+' รายการ</span>':'');
}
function renderInvStats(el){
  const rows=invRows();
  const open=rows.reduce((s,r)=>s+r.open,0), prod=rows.reduce((s,r)=>s+r.prod,0),
        disp=rows.reduce((s,r)=>s+r.disp,0), bal=rows.reduce((s,r)=>s+r.bal,0);
  [{lab:'ยอดยกมา',val:fmt(open),sub:invScopeText()},
   {lab:'ผลิตรวม',val:fmt(prod),sub:'หน่วย',c:'accent'},
   {lab:'จ่ายรวม',val:fmt(disp),sub:'หน่วย',c:'orange'},
   {lab:'คงเหลือ',val:fmt(bal),sub:'ยกมา + ผลิต − จ่าย',d:bal>=0?'up':'down'}
  ].forEach(c=>{ const d=document.createElement('div'); d.className='card'+(c.c?' '+c.c:'');
    const vc=c.d?(' class="'+c.d+'"'):''; d.innerHTML='<div class="lab">'+c.lab+'</div><div class="val"><span'+vc+'>'+c.val+'</span></div><div class="sub">'+c.sub+'</div>'; el.appendChild(d); });
}
function renderInvTable(){
  const rows=invRows(); const q=filter.trim().toLowerCase();
  const thead=document.getElementById('thead'), tbody=document.getElementById('tbody');
  thead.innerHTML='<tr><th class="c-no">ที่</th><th class="c-name">รายการ</th>'
    +'<th>ยกมา</th><th>ผลิต</th><th>จ่าย</th><th class="tot">คงเหลือ</th></tr>';
  let s='', n=0, to=0,tp=0,td=0,tb=0;
  rows.forEach(r=>{
    to+=r.open; tp+=r.prod; td+=r.disp; tb+=r.bal;
    if(q&&r.name.toLowerCase().indexOf(q)===-1) return;
    n++;
    const z=v=>v===0?' zero':'';
    s+='<tr><td class="c-no">'+n+'</td><td class="c-name" title="'+esc(r.name)+'">'+esc(r.name)+'</td>'
      +'<td class="bf'+z(r.open)+'">'+fmt(r.open)+'</td>'
      +'<td class="'+z(r.prod).trim()+'">'+fmt(r.prod)+'</td>'
      +'<td class="'+z(r.disp).trim()+'">'+fmt(r.disp)+'</td>'
      +'<td class="tot'+(r.bal<0?' neg':'')+'">'+fmt(r.bal)+'</td></tr>';
  });
  s+='<tr class="invtot"><td class="c-no"></td><td class="c-name">รวมทั้งหมด</td>'
    +'<td>'+fmt(to)+'</td><td>'+fmt(tp)+'</td><td>'+fmt(td)+'</td><td class="tot'+(tb<0?' neg':'')+'">'+fmt(tb)+'</td></tr>';
  tbody.innerHTML=s;
}

/* ---------- switching ---------- */
function setCmpMode(m){ cmpMode=m;
  document.querySelectorAll('#cmpSeg button').forEach(b=>b.classList.toggle('on',b.dataset.c===m));
  document.getElementById('cmpWrap').style.display=m==='2'?'inline-flex':'none';
  renderStats(); renderChart(); }
function setMode(m){ mode=m; const chart=m==='chart';
  document.querySelectorAll('#viewSeg button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  document.getElementById('tablePane').classList.toggle('hidden',chart);
  document.getElementById('chartPane').classList.toggle('hidden',!chart);
  document.getElementById('colorBar').classList.toggle('hidden',!chart);
  document.getElementById('monthCaption').classList.toggle('hidden',chart);
  document.getElementById('monthTabs').style.display=chart?'none':'';
  document.getElementById('searchWrap').style.display=chart?'none':'';
  document.getElementById('chartCtrls').style.display=chart?'inline-flex':'none';
  document.getElementById('printBtn').classList.remove('hidden');
  document.getElementById('printBtn').title=chart?'พิมพ์กราฟ (แนวตั้ง)':'พิมพ์ตาราง (แนวนอน)';
  if(chart && EDIT){ EDIT=false; document.getElementById('editLbl').textContent='แก้ไข'; document.getElementById('editBtn').classList.remove('on'); }
  document.getElementById('editBtn').classList.toggle('hidden',chart);
  document.getElementById('xlsxBtn').classList.toggle('hidden',chart);
  if(chart) document.getElementById('sumWarn').classList.add('hidden');
  document.getElementById('footnote').textContent = chart
    ? 'แต่ละแท่ง = ยอด'+SECTION_WORD+'รวมทั้งเดือนของแต่ละรายการ · กดปุ่มพิมพ์เพื่อพิมพ์กราฟแนวตั้ง 1 หน้า'
    : 'ตัวเลขสีเทา = 0 · คอลัมน์สีเหลือง = วันเสาร์ (ส.) · แถบฟ้า = สรุปยอด · กดพิมพ์เพื่อพิมพ์ตารางแนวนอน';
  renderStats(); if(chart) renderChart(); else { renderCaption(); renderTable(); }
  renderNameWarn([{grid:(PRODUCTS[activeProd]&&PRODUCTS[activeProd].grid),where:SECTION_WORD}]); }

/* ---------- print ---------- */
const pageStyle=document.createElement('style'); document.head.appendChild(pageStyle);
function printIsChart(){ return (!INV) && (PJ || mode==='chart'); }
function buildPrintBanner(){
  const banner=document.getElementById('printBanner');
  const now=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  if(INV){
    const rows=invRows(); const bal=rows.reduce((s,r)=>s+r.bal,0), neg=rows.filter(r=>r.bal<0).length;
    const sub=invScopeText()+' · '+rows.length+' รายการ · คงเหลือรวม '+fmt(bal)+(neg?(' · ติดลบ '+neg+' รายการ'):'')+' · '+(FILE_NAME||'');
    banner.innerHTML='<div class="pb-t">สรุปยอดคงเหลือ — '+esc(INV_LABELS[invProdIdx])+'</div><div class="pb-s">'+esc(sub)+' · พิมพ์เมื่อ '+now+'</div>';
    return;
  }
  if(PJ){
    const {label,rows}=pjData();
    const tp=rows.reduce((s,r)=>s+(r.prod||0),0), td=rows.reduce((s,r)=>s+(r.disp||0),0), diff=tp-td;
    const sub=rows.map(r=>r.month+': ผลิต '+fmt(r.prod)+' / จ่าย '+fmt(r.disp)+(r.prod?(' ('+((r.disp||0)/r.prod*100).toFixed(1)+'%)'):'')).join('  ·  ')+'  ·  คงเหลือรวม '+(diff>=0?'+':'−')+fmt(Math.abs(diff));
    banner.innerHTML='<div class="pb-t">เทียบ ผลิต ↔ จ่าย — '+esc(label)+'</div><div class="pb-s">'+esc(sub)+' · พิมพ์เมื่อ '+now+'</div>';
    return;
  }
  if(mode==='chart'){
    let sub;
    if(cmpMode==='2'){
      const ai=+document.getElementById('cmpA').value, bi=+document.getElementById('cmpB').value;
      const tA=sectionTotal(BLOCKS[ai]), tB=sectionTotal(BLOCKS[bi]), diff=tB-tA, pct=tA?diff/tA*100:0;
      sub=monthLabel(BLOCKS[ai].title)+' '+fmt(tA)+'  vs  '+monthLabel(BLOCKS[bi].title)+' '+fmt(tB)+'  ('+(diff>=0?'+':'−')+Math.abs(pct).toFixed(1)+'%)';
    } else { sub='เทียบ '+BLOCKS.length+' เดือน: '+BLOCKS.map(b=>monthLabel(b.title)).join(' · '); }
    banner.innerHTML='<div class="pb-t">รายงาน'+esc(SECTION_WORD)+esc(PROD_LABEL)+' — เปรียบเทียบยอด'+esc(SECTION_WORD)+'รายเดือน</div><div class="pb-s">'+esc(sub)+' · '+esc(SHEET_SUB)+' · พิมพ์เมื่อ '+now+'</div>';
  } else {
    const b=BLOCKS[active];
    const sub='เดือน'+monthLabel(b.title)+' · '+b.items.length+' รายการ · '+b.dayCols.length+' วัน · รวม'+SECTION_WORD+' '+fmt(sectionTotal(b))+' · '+SHEET_SUB;
    banner.innerHTML='<div class="pb-t">รายงาน'+esc(SECTION_WORD)+esc(PROD_LABEL)+' — ตารางราย'+esc(SECTION_WORD)+' (เดือน'+esc(monthLabel(b.title))+')</div><div class="pb-s">'+esc(sub)+' · พิมพ์เมื่อ '+now+'</div>';
  }
}
function applyPrintClass(){
  const chart=printIsChart();
  document.body.classList.remove('pt-chart','pt-table');
  document.body.classList.add(chart?'pt-chart':'pt-table');
  const margin=chart?12:6;
  pageStyle.textContent='@page{ size:A4 '+(chart?'portrait':'landscape')+'; margin:'+margin+'mm }';
  if(!chart){
    const tbl=document.getElementById('tbl');
    if(tbl && tbl.scrollWidth && tbl.scrollHeight){
      const mm=3.7795, sw=tbl.scrollWidth, sh=tbl.scrollHeight;
      const availW=(297-2*margin)*mm;               // landscape printable width (px @96dpi)
      const availH=(210-2*margin)*mm - 145;          // minus banner/stats/caption area
      let z=Math.min(1, availW/sw, availH/sh); z=Math.max(0.18, z);
      const rs=document.documentElement.style;
      rs.setProperty('--pz', z.toFixed(3));
      rs.setProperty('--pw', Math.ceil(sw*z)+'px');
      rs.setProperty('--ph', Math.ceil(sh*z)+'px');
    }
  } else {
    ['--pz','--pw','--ph'].forEach(v=>document.documentElement.style.removeProperty(v));
  }
}
function doPrint(){ buildPrintBanner(); applyPrintClass(); window.print(); }
window.onbeforeprint=()=>{ buildPrintBanner(); applyPrintClass(); };
window.onafterprint=()=>{ document.body.classList.remove('pt-chart','pt-table'); };

/* ---------- events ---------- */
document.querySelectorAll('#viewSeg button').forEach(b=>b.onclick=()=>setMode(b.dataset.m));
document.querySelectorAll('#cmpSeg button').forEach(b=>b.onclick=()=>setCmpMode(b.dataset.c));

  renderInvModeSeg(); renderInvMonthTabs(); renderStats(); renderInvCaption(); renderInvTable(); });
document.getElementById('cmpA').onchange=()=>{ renderStats(); renderChart(); };
document.getElementById('cmpB').onchange=()=>{ renderStats(); renderChart(); };
document.getElementById('printBtn').onclick=doPrint;
document.getElementById('q').addEventListener('input',e=>{ filter=e.target.value; if(INV) renderInvTable(); else renderTable(); });
let rz; window.addEventListener('resize',()=>{ if(INV||mode!=='chart') return; clearTimeout(rz); rz=setTimeout(renderChart,120); });

/* ---------- load / upload ---------- */
function load(grid,meta){
  BLOCKS=parseBlocks(grid);
  if(!BLOCKS.length){ alert('ไม่พบตารางรูปแบบรายงานในชีทนี้'); return; }
  active=0; filter=''; cmpMode='2'; document.getElementById('q').value='';
  if(meta&&meta.title) document.getElementById('winTitle').textContent=meta.title;
  if(meta&&meta.sub){ document.getElementById('winSub').textContent=meta.sub; SHEET_SUB=meta.sub; }
  document.getElementById('viewSeg').style.display=BLOCKS.length>1?'inline-flex':'none';
  document.querySelectorAll('#cmpSeg button').forEach(b=>b.classList.toggle('on',b.dataset.c==='2'));
  document.getElementById('cmpWrap').style.display='inline-flex';
  renderTabs(); fillCmp(); setMode(mode);
}
function sheetGrid(wb,n){ return XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,raw:true,defval:null}); }
function buildSections(wb){
  const names=wb.SheetNames, strip=s=>s.replace(/\s/g,'');
  const prod=[], disp=[];
  const hp=names.find(n=>strip(n)==='Hเดือน'); if(hp) prod.push({label:'ลูกชิ้นหมู',sheet:hp,grid:sheetGrid(wb,hp)});
  const kp=names.find(n=>strip(n)==='Kเดือน'); if(kp) prod.push({label:'ลูกชิ้นเนื้อ',sheet:kp,grid:sheetGrid(wb,kp)});
  function addDisp(exacts,contains,label){
    let n=null;
    for(const ex of exacts){ n=names.find(x=>strip(x).toLowerCase()===ex); if(n) break; }
    if(!n) n=names.find(contains);
    if(!n) return;
    let gr=sheetGrid(wb,n); if(isWeekly(gr)) gr=consolidateWeekly(gr);
    disp.push({label,sheet:n,grid:gr});
  }
  addDisp(['จ่ายหมูm','จ่าย'],n=>n.indexOf('จ่าย')>-1&&n.indexOf('หมู')>-1,'ลูกชิ้นหมู');
  addDisp(['จ่ายเนื้อm','จ่ายเนื้อ'],n=>(n.indexOf('จ่าย')>-1||n.indexOf('เบิก')>-1)&&n.indexOf('เนื้อ')>-1,'ลูกชิ้นเนื้อ');
  const secs=[];
  if(prod.length) secs.push({key:'ผลิต',word:'ผลิต',products:prod});
  if(disp.length) secs.push({key:'จ่าย',word:'จ่าย',products:disp});
  if(!secs.length){ const n=names[0]; secs.push({key:'ผลิต',word:'ผลิต',products:[{label:n,sheet:n,grid:sheetGrid(wb,n)}]}); }
  return secs;
}
document.getElementById('cloudSaveBtn').onclick=cloudSave;
document.getElementById('cloudLoadBtn').onclick=cloudLoad;
document.getElementById('colorJsonFile').addEventListener('change',e=>{ const f=e.target.files[0]; if(f) importColorsJson(f); e.target.value=''; });
document.getElementById('file').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f) return;
  try{
    const buf=await f.arrayBuffer(); SRC_BYTES=new Uint8Array(buf).slice(); const wb=XLSX.read(buf,{type:'array'});
    SECTIONS=buildSections(wb); FILE_NAME=f.name; activeSection=0; activeProd=0; PJ=false; INV=false;
    saveData(); saveUI(); renderSectionTabs(); loadSection(0);
    const info=document.getElementById('saveInfo'); if(LS_OK) info.textContent='💾 บันทึกไว้ในเครื่อง · '+FILE_NAME;
  }catch(err){ alert('อ่านไฟล์ไม่สำเร็จ: '+err.message); }
  e.target.value='';
});
document.getElementById('clearSaved').onclick=()=>{
  confirmModal({ title:'ล้างข้อมูลที่บันทึก', okLabel:'ล้างข้อมูล', okDanger:true,
    msg:'ล้างสีและไฟล์ที่บันทึกไว้ในเครื่องนี้ แล้วกลับไปใช้ข้อมูลเริ่มต้น?<br><span style="color:#86868b;font-size:12px">ไฟล์ Excel ของคุณไม่ถูกแตะต้อง</span>',
    onOk:()=>{
      [LS.c,LS.d,LS.u].forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
      COLORMAP={}; COLORS=PAL.slice(); SECTIONS=SECTIONS_INIT; FILE_NAME=''; activeSection=0; activeProd=0; PJ=false; INV=false;
      renderSectionTabs(); loadSection(0);
      document.getElementById('saveInfo').textContent=LS_OK?'💾 บันทึกอัตโนมัติในเครื่องนี้':'⚠️ เบราว์เซอร์นี้บันทึกไม่ได้';
    }});
};
(function boot(){
  try{ if(COLOR_DEFAULTS&&typeof COLOR_DEFAULTS==='object') COLORMAP=JSON.parse(JSON.stringify(COLOR_DEFAULTS)); }catch(e){}
  const sc=lsGet(LS.c); if(sc&&typeof sc==='object'&&!Array.isArray(sc)) Object.assign(COLORMAP,sc);
  const sd=lsGet(LS.d), su=lsGet(LS.u)||{};
  if(sd&&sd.sections&&sd.sections.length){ SECTIONS=sd.sections; FILE_NAME=sd.fileName||''; } else SECTIONS=SECTIONS_INIT;
  activeSection=(su.activeSection!=null&&su.activeSection<SECTIONS.length)?su.activeSection:0;
  SECTION_WORD=SECTIONS[activeSection].word||SECTIONS[activeSection].key; PRODUCTS=SECTIONS[activeSection].products;
  activeProd=(su.activeProd!=null&&su.activeProd<PRODUCTS.length)?su.activeProd:0;
  renderSectionTabs(); renderProdTabs(); loadProduct(activeProd);
  const info=document.getElementById('saveInfo'), clr=document.getElementById('clearSaved');
  info.textContent=LS_OK?(FILE_NAME?('💾 บันทึกไว้ในเครื่อง · '+FILE_NAME):'💾 บันทึกอัตโนมัติในเครื่องนี้'):'⚠️ เบราว์เซอร์นี้บันทึกไม่ได้';
  clr.style.display=LS_OK?'':'none';
  const si=document.getElementById('slotInput'); if(si) si.value=(lsGet('mbr_slot')||FILE_NAME||'ตลาด กช.');
})();
setTimeout(()=>{ const s=document.getElementById('splash'); if(s){ s.classList.add('hide'); setTimeout(()=>s.remove(),600); } },1500);
